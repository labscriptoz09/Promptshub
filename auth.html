<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B1120 0%, #1E293B 100%);
            color: #F1F5F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(167, 139, 250, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
        }
        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #A78BFA, #2DD4BF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: rgba(11, 17, 32, 0.5);
            padding: 0.5rem;
            border-radius: 12px;
        }
        .tab {
            flex: 1;
            padding: 0.8rem;
            background: transparent;
            border: none;
            color: #94A3B8;            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #A78BFA, #2DD4BF);
            color: #0B1120;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94A3B8;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(11, 17, 32, 0.5);
            border: 1px solid rgba(167, 139, 250, 0.1);
            border-radius: 10px;
            color: #F1F5F9;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #A78BFA;
        }
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #A78BFA, #2DD4BF);
            color: #0B1120;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .message {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
        }
        .message.success {            background: rgba(45, 212, 191, 0.1);
            border: 1px solid rgba(45, 212, 191, 0.3);
            color: #2DD4BF;
            display: block;
        }
        .message.error {
            background: rgba(244, 114, 182, 0.1);
            border: 1px solid rgba(244, 114, 182, 0.3);
            color: #F472B6;
            display: block;
        }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .back-link {
            text-align: center;
            margin-top: 2rem;
        }
        .back-link a {
            color: #A78BFA;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">⚡ PromptHub</div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Connexion</button>
            <button class="tab" onclick="switchTab('signup')">Inscription</button>
        </div>

        <div id="message" class="message"></div>

        <!-- Formulaire de Connexion -->
        <form id="loginForm" class="form-section active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">Mot de passe</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Se connecter</button>
        </form>

        <!-- Formulaire d'Inscription -->
        <form id="signupForm" class="form-section" onsubmit="handleSignup(event)">
            <div class="form-group">                <label for="signupName">Nom complet</label>
                <input type="text" id="signupName" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" required placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label for="signupPassword">Mot de passe</label>
                <input type="password" id="signupPassword" required placeholder="••••••••" minlength="6">
            </div>
            <button type="submit" class="btn-submit">Créer mon compte</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Retour à l'accueil</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://osewbqnjhokpwmoalxcd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZXdicW5qaG9rcHdtb2FseGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTcyMTQsImV4cCI6MjA5NjU5MzIxNH0.knlpmVwUa2gd_ft3AptsUpl5gih4rCjTBYqGSRK5p38';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
            document.getElementById('message').className = 'message';
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        async function handleSignup(event) {
            event.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;            
            const btn = event.target.querySelector('.btn-submit');
            btn.disabled = true;
            btn.textContent = 'Création...';
            
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { full_name: name } }
                });
                
                if (error) throw error;
                showMessage('✅ Compte créé ! Vérifiez votre email.', 'success');
                setTimeout(() => switchTab('login'), 3000);
            } catch (error) {
                showMessage('❌ ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Créer mon compte';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const btn = event.target.querySelector('.btn-submit');
            btn.disabled = true;
            btn.textContent = 'Connexion...';
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                showMessage('✅ Connexion réussie !', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } catch (error) {
                showMessage('❌ ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        }
    </script>
</body></html>
