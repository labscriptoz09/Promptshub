<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: rgba(17, 24, 39, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --accent-cyan: #22d3ee;
            --accent-blue: #60a5fa;
            --border-color: rgba(34, 211, 238, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        h1, h2, .logo, .tab, .btn-submit { font-family: 'Space Grotesk', sans-serif; }
        #aiBackground { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; }
        .auth-container {
            width: 100%; max-width: 450px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        .logo { 
            text-align: center; 
            font-size: 2rem; 
            font-weight: 800;             background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 2rem; 
        }
        .tabs { 
            display: flex; 
            gap: 0.5rem; 
            margin-bottom: 2rem; 
            background: rgba(10, 14, 26, 0.5); 
            padding: 0.5rem; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
        }
        .tab { 
            flex: 1; 
            padding: 0.8rem; 
            background: transparent; 
            border: none; 
            color: var(--text-secondary); 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: all 0.3s; 
        }
        .tab.active { 
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); 
            color: #0a0e1a; 
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        input { 
            width: 100%; 
            padding: 0.9rem 1rem; 
            background: rgba(10, 14, 26, 0.5); 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            color: var(--text-primary); 
            font-size: 1rem; 
            transition: all 0.3s; 
        }
        input:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1); }
        .btn-submit { 
            width: 100%; 
            padding: 1rem; 
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); 
            color: #0a0e1a; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700;             font-size: 1rem; 
            cursor: pointer; 
            margin-top: 1rem; 
            transition: all 0.3s; 
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(34, 211, 238, 0.4); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem; display: none; text-align: center; font-size: 0.9rem; }
        .message.success { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); color: #34d399; display: block; }
        .message.error { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #f87171; display: block; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .back-link { text-align: center; margin-top: 2rem; }
        .back-link a { color: var(--accent-cyan); text-decoration: none; font-size: 0.9rem; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <canvas id="aiBackground"></canvas>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="logo">⚡ PromptHub</div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Connexion</button>
            <button class="tab" onclick="switchTab('signup')">Inscription</button>
        </div>

        <div id="message" class="message"></div>

        <form id="loginForm" class="form-section active" onsubmit="handleLogin(event)">
            <div class="form-group"><label for="loginEmail">Email</label><input type="email" id="loginEmail" required placeholder="votre@email.com"></div>
            <div class="form-group"><label for="loginPassword">Mot de passe</label><input type="password" id="loginPassword" required placeholder="••••••••"></div>
            <button type="submit" class="btn-submit">Se connecter</button>
        </form>

        <form id="signupForm" class="form-section" onsubmit="handleSignup(event)">
            <div class="form-group"><label for="signupName">Nom complet</label><input type="text" id="signupName" required placeholder="John Doe"></div>
            <div class="form-group"><label for="signupEmail">Email</label><input type="email" id="signupEmail" required placeholder="votre@email.com"></div>
            <div class="form-group"><label for="signupPassword">Mot de passe</label><input type="password" id="signupPassword" required placeholder="••••••••" minlength="6"></div>
            <button type="submit" class="btn-submit">Créer mon compte</button>
        </form>

        <div class="back-link"><a href="index.html">← Retour à l'accueil</a></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://osewbqnjhokpwmoalxcd.supabase.co';        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZXdicW5qaG9rcHdtb2FseGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTcyMTQsImV4cCI6MjA5NjU5MzIxNH0.knlpmVwUa2gd_ft3AptsUpl5gih4rCjTBYqGSRK5p38';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            if (tab === 'login') { 
                document.querySelector('.tab:first-child').classList.add('active'); 
                document.getElementById('loginForm').classList.add('active'); 
            } else { 
                document.querySelector('.tab:last-child').classList.add('active'); 
                document.getElementById('signupForm').classList.add('active'); 
            }
            document.getElementById('message').className = 'message';
        }

        function showMessage(text, type) { 
            const messageEl = document.getElementById('message'); 
            messageEl.textContent = text; 
            messageEl.className = `message ${type}`; 
        }

        async function handleSignup(event) {
            event.preventDefault();
            const name = document.getElementById('signupName').value; 
            const email = document.getElementById('signupEmail').value; 
            const password = document.getElementById('signupPassword').value;
            const btn = event.target.querySelector('.btn-submit'); 
            btn.disabled = true; 
            btn.textContent = 'Création...';
            try {
                const { error } = await supabaseClient.auth.signUp({ 
                    email, password, 
                    options: { data: { full_name: name } } 
                });
                if (error) throw error;
                showMessage('✅ Compte créé ! Vérifiez votre email.', 'success');
                setTimeout(() => switchTab('login'), 3000);
            } catch (error) { 
                showMessage('❌ ' + error.message, 'error'); 
            } finally { 
                btn.disabled = false; 
                btn.textContent = 'Créer mon compte'; 
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value; 
            const password = document.getElementById('loginPassword').value;            const btn = event.target.querySelector('.btn-submit'); 
            btn.disabled = true; 
            btn.textContent = 'Connexion...';
            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showMessage('✅ Connexion réussie !', 'success');
                // ✅ Redirection vers l'accueil (Méthode 1)
                setTimeout(() => { 
                    window.location.replace('index.html'); 
                }, 1500);
            } catch (error) { 
                showMessage('❌ ' + error.message, 'error'); 
            } finally { 
                btn.disabled = false; 
                btn.textContent = 'Se connecter'; 
            }
        }

        // ✅ Si déjà connecté, rediriger vers l'accueil
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.replace('index.html');
            }
        }
        checkAuth();

        // Fond animé IA
        function initAIBackground() {
            const canvas = document.getElementById('aiBackground'); 
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            let particles = [];
            class Particle {
                constructor() { 
                    this.x = Math.random() * canvas.width; 
                    this.y = Math.random() * canvas.height; 
                    this.vx = (Math.random() - 0.5) * 0.8; 
                    this.vy = (Math.random() - 0.5) * 0.8; 
                    this.size = Math.random() * 3 + 2; 
                    this.color = Math.random() > 0.5 ? '#22d3ee' : '#60a5fa';
                }
                update() { 
                    this.x += this.vx; this.y += this.vy; 
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1; 
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1; 
                }
                draw() {                     ctx.fillStyle = this.color; 
                    ctx.beginPath(); 
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                    ctx.fill(); 
                }
            }
            function init() { 
                particles = []; 
                for (let i = 0; i < 60; i++) particles.push(new Particle()); 
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update(); 
                    particles[i].draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x; 
                        const dy = particles[i].y - particles[j].y; 
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < 150) { 
                            ctx.beginPath(); 
                            ctx.strokeStyle = `rgba(34, 211, 238, ${0.3 * (1 - distance / 150)})`; 
                            ctx.lineWidth = 1; 
                            ctx.moveTo(particles[i].x, particles[i].y); 
                            ctx.lineTo(particles[j].x, particles[j].y); 
                            ctx.stroke(); 
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            init(); 
            animate();
            window.addEventListener('resize', () => { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight; 
                init(); 
            });
        }
        initAIBackground();
    </script>
</body>
</html>
