<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub - Espace Acheteur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: rgba(17, 24, 39, 0.7);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --accent-cyan: #22d3ee;
            --accent-blue: #60a5fa;
            --accent-green: #34d399;
            --accent-orange: #fbbf24;
            --accent-red: #f87171;
            --border-color: rgba(34, 211, 238, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); line-height: 1.6; position: relative; }
        h1, h2, h3, .logo, .stat-value, .btn, .prompt-info h3, .tab { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
        
        #aiBackground { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* NAVBAR */
        .navbar { background: rgba(10, 14, 26, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 2rem; align-items: center; flex: 1; }
        .nav-links a { color: var(--text-secondary); font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-cyan); }
        .nav-actions { display: flex; gap: 0.75rem; align-items: center; }

        /* BOUTONS */
        .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; font-size: 0.9rem; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn-outline:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(34, 211, 238, 0.1); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); color: #0a0e1a; font-weight: 700; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(34, 211, 238, 0.4); }
        .btn-danger { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #f87171; }
        .btn-small { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        /* DASHBOARD */
        .dashboard { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .dashboard-header { margin-bottom: 2rem; }
        .dashboard-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .dashboard-header p { color: var(--text-secondary); }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(20px); }
        .stat-card h3 { color: var(--text-secondary); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent-cyan); }

        /* TABS */
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); overflow-x: auto; }
        .tab { padding: 0.75rem 1.5rem; background: transparent; border: none; color: var(--text-secondary); font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.3s; white-space: nowrap; }
        .tab.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }

        /* SECTIONS */
        .section { display: none; }
        .section.active { display: block; }

        /* LISTE DES PROMPTS ACHETÉS */
        .prompts-list { display: grid; gap: 1rem; }
        .prompt-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(20px); display: flex; gap: 1.5rem; align-items: flex-start; }
        .prompt-image { width: 120px; height: 120px; border-radius: 8px; object-fit: cover; background: rgba(10, 14, 26, 0.5); flex-shrink: 0; }
        .prompt-info { flex: 1; }
        .prompt-info h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .prompt-info p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; }
        
        /* ZONE DU PROMPT CACHÉ */
        .prompt-content-box {
            background: rgba(10, 14, 26, 0.6);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            position: relative;
        }
        .prompt-content-box.revealed { border-style: solid; border-color: var(--accent-cyan); color: var(--text-primary); }
        .blur-overlay { filter: blur(4px); user-select: none; }

        .prompt-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }

        /* HISTORIQUE */
        .history-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        .history-table th, .history-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .history-table th { background: rgba(10, 14, 26, 0.5); color: var(--text-secondary); font-size: 0.875rem; text-transform: uppercase; }        .status-paid { color: var(--accent-green); font-weight: 600; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .dashboard { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .prompt-item { flex-direction: column; }
            .prompt-image { width: 100%; height: 180px; }
        }
    </style>
</head>
<body>
    <canvas id="aiBackground"></canvas>
    <div class="grid-overlay"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">⚡ PromptHub</a>
            <ul class="nav-links">
                <li><a href="index.html">🏠 Accueil</a></li>
                <li><a href="acheteur.html" class="active">Mes Achats</a></li>
                <li><a href="vendeur.html">💼 Vendre</a></li>
            </ul>
            <div class="nav-actions" id="navActions"></div>
        </div>
    </nav>

    <div class="dashboard">
        <div class="dashboard-header">
            <h1>Espace Acheteur</h1>
            <p>Retrouvez vos prompts achetés et gérez votre bibliothèque</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Prompts Achetés</h3><div class="stat-value" id="statBought">0</div></div>
            <div class="stat-card"><h3>Total Dépensé</h3><div class="stat-value" id="statSpent">$0</div></div>
            <div class="stat-card"><h3>Économies Réalisées</h3><div class="stat-value">~120h</div></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('library')">📚 Ma Bibliothèque</button>
            <button class="tab" onclick="switchTab('history')">🧾 Historique</button>
        </div>

        <!-- BIBLIOTHÈQUE -->
        <div id="librarySection" class="section active">
            <div class="prompts-list" id="purchasedPromptsList">
                <p style="text-align: center; color: var(--text-secondary); padding: 2rem;">Chargement de votre bibliothèque...</p>
            </div>
        </div>
        <!-- HISTORIQUE -->
        <div id="historySection" class="section">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Prompt</th>
                        <th>Vendeur</th>
                        <th>Montant</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <!-- Rempli par JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://osewbqnjhokpwmoalxcd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZXdicW5qaG9rcHdtb2FseGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTcyMTQsImV4cCI6MjA5NjU5MzIxNH0.knlpmVwUa2gd_ft3AptsUpl5gih4rCjTBYqGSRK5p38';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ✅ NAVBAR & AUTH
        function updateNavbar(session) {
            const navActions = document.getElementById('navActions');
            if (session) {
                const userName = session.user.user_metadata.full_name || 'Utilisateur';
                navActions.innerHTML = `
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">👋 ${userName}</span>
                    <button id="btn-logout" class="btn btn-danger" style="font-size: 0.8rem; padding: 0.5rem 0.8rem;">🚪 Déconnexion</button>
                `;
                document.getElementById('btn-logout').addEventListener('click', deconnexion);
            } else {
                navActions.innerHTML = `
                    <a href="auth.html" class="btn btn-outline">Connexion</a>
                    <a href="auth.html" class="btn btn-primary">S'inscrire</a>
                `;
            }
        }

        function deconnexion() {
            localStorage.clear(); sessionStorage.clear();
            supabaseClient.auth.signOut().catch(err => console.log('Signout:', err));
            window.location.replace('index.html?logout=' + Date.now());
        }
        supabaseClient.auth.onAuthStateChange((event, session) => {
            updateNavbar(session);
            if (event === 'SIGNED_OUT') window.location.replace('auth.html');
        });

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.replace('auth.html'); return; }
            loadPurchasedPrompts(session.user.id); // Charger les prompts de cet utilisateur
        }

        // ✅ NAVIGATION
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            if (tab === 'library') { 
                document.querySelector('.tab:first-child').classList.add('active'); 
                document.getElementById('librarySection').classList.add('active'); 
            } else { 
                document.querySelector('.tab:last-child').classList.add('active'); 
                document.getElementById('historySection').classList.add('active'); 
            }
        }

        // ✅ CHARGER LES PROMPTS ACHETÉS
        async function loadPurchasedPrompts(userId) {
            const container = document.getElementById('purchasedPromptsList');
            const historyBody = document.getElementById('historyTableBody');
            
            // NOTE: Ici, on suppose que tu as une table 'purchases' dans Supabase.
            // Pour l'instant, je mets des données de démo pour que tu voies le rendu visuel.
            // Quand Stripe sera connecté, on remplacera ça par le vrai appel Supabase.
            
            const mockPurchases = [
                {
                    id: 1, title: "Elite Email Marketing Pro", 
                    description: "Transform your email campaigns with conversion-optimized prompts.",
                    image_url: "https://images.unsplash.com/photo-1557804506-669a67965ba0?w=400",
                    prompt_content: "Agis comme un expert en copywriting. Rédige une séquence de 5 emails pour vendre [PRODUIT] en utilisant le framework PAS (Problème-Agitation-Solution). Le ton doit être persuasif mais empathique.",
                    price: 19.99, seller: "AlexCreator", date: "2024-06-10"
                },
                {
                    id: 2, title: "Advanced Code Architect", 
                    description: "Generate production-grade code instantly.",
                    image_url: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400",
                    prompt_content: "Tu es un architecte logiciel senior. Analyse le code suivant et propose une refactorisation complète en suivant les principes SOLID. Ajoute des commentaires JSDoc et gère les erreurs de manière asynchrone.",
                    price: 16.99, seller: "DevMaster", date: "2024-06-08"
                }
            ];
            // Mise à jour des stats
            document.getElementById('statBought').textContent = mockPurchases.length;
            const total = mockPurchases.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('statSpent').textContent = '$' + total.toFixed(2);

            // Affichage Bibliothèque
            container.innerHTML = '';
            mockPurchases.forEach(p => {
                container.innerHTML += `
                    <div class="prompt-item">
                        <img src="${p.image_url}" alt="${p.title}" class="prompt-image">
                        <div class="prompt-info">
                            <h3>${p.title}</h3>
                            <p>${p.description}</p>
                            <div class="prompt-content-box" id="box-${p.id}">
                                <div class="blur-overlay" id="blur-${p.id}">
                                    Le contenu de ce prompt est protégé. Cliquez sur révéler pour le copier.
                                </div>
                                <div id="content-${p.id}" style="display:none;">${p.prompt_content}</div>
                            </div>
                            <div class="prompt-actions">
                                <button class="btn btn-primary btn-small" onclick="revealPrompt(${p.id})">️ Révéler</button>
                                <button class="btn btn-outline btn-small" id="copy-btn-${p.id}" onclick="copyPrompt(${p.id})" style="display:none;"> Copier le prompt</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Affichage Historique
            historyBody.innerHTML = '';
            mockPurchases.forEach(p => {
                historyBody.innerHTML += `
                    <tr>
                        <td>${p.date}</td>
                        <td>${p.title}</td>
                        <td>${p.seller}</td>
                        <td>$${p.price}</td>
                        <td class="status-paid">✅ Payé</td>
                    </tr>
                `;
            });
        }

        // ✅ RÉVÉLER LE PROMPT
        function revealPrompt(id) {
            document.getElementById(`blur-${id}`).style.display = 'none';
            document.getElementById(`content-${id}`).style.display = 'block';
            document.getElementById(`box-${id}`).classList.add('revealed');
            document.getElementById(`copy-btn-${id}`).style.display = 'inline-block';        }

        // ✅ COPIER LE PROMPT
        function copyPrompt(id) {
            const text = document.getElementById(`content-${id}`).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(`copy-btn-${id}`);
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Copié !';
                btn.style.borderColor = 'var(--accent-green)';
                btn.style.color = 'var(--accent-green)';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.borderColor = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        // FOND ANIMÉ IA
        function initAIBackground() {
            const canvas = document.getElementById('aiBackground');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            class Particle {
                constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.8; this.vy = (Math.random() - 0.5) * 0.8; this.size = Math.random() * 3 + 2; this.color = Math.random() > 0.5 ? '#22d3ee' : '#60a5fa'; }
                update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; }
                draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
            }
            function init() { particles = []; for (let i = 0; i < 60; i++) particles.push(new Particle()); }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update(); particles[i].draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y; const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < 150) { ctx.beginPath(); ctx.strokeStyle = `rgba(34, 211, 238, ${0.3 * (1 - distance / 150)})`; ctx.lineWidth = 1; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                    }
                }
                requestAnimationFrame(animate);
            }
            init(); animate();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); });
        }

        document.addEventListener('DOMContentLoaded', () => { checkAuth(); initAIBackground(); });
    </script>
</body>
  </html>
