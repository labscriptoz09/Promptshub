<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .error { background: #ef4444; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .success { background: #10b981; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #3b82f6; margin-top: 10px; }
        table { width: 100%; background: #1e293b; border-radius: 12px; overflow: hidden; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; }
        .btn { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        .btn-danger { background: #ef4444; }
        .badge { padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .badge-admin { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .badge-buyer { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .badge-seller { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎛️ PromptHub Admin</h1>
        <div id="messages"></div>
        
        <div id="adminContent" style="display: none;">
            <div class="stats">
                <div class="stat-card">
                    <div>Utilisateurs</div>
                    <div class="stat-value" id="statUsers">0</div>
                </div>
                <div class="stat-card">
                    <div>Prompts</div>
                    <div class="stat-value" id="statPrompts">0</div>
                </div>
                <div class="stat-card">
                    <div>Ventes</div>
                    <div class="stat-value" id="statSales">0</div>
                </div>
                <div class="stat-card">
                    <div>Revenus</div>
                    <div class="stat-value" id="statRevenue">$0</div>
                </div>
            </div>
            <h2>👥 Utilisateurs</h2>
            <table>
                <thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Actions</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>

            <h2 style="margin-top: 30px;">📦 Prompts</h2>
            <table>
                <thead><tr><th>Titre</th><th>Prix</th><th>Statut</th><th>Actions</th></tr></thead>
                <tbody id="promptsTable"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CRÉER LE CLIENT EN PREMIER (comme dans le test qui a marché)
        const SUPABASE_URL = 'https://osewbqnjhokpwmoalxcd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZXdicW5qaG9rcHdtb2FseGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTcyMTQsImV4cCI6MjA5NjU5MzIxNH0.knlpmVwUa2gd_ft3AptsUpl5gih4rCjTBYqGSRK5p38';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            console.log('🚀 Démarrage admin.html...');
            
            // 1. Vérifier session
            const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
            if (sessionError || !session) {
                showMessage('❌ Non connecté. Redirection...', 'error');
                setTimeout(() => window.location.href = 'auth.html', 2000);
                return;
            }
            console.log('✅ Connecté:', session.user.email);

            // 2. Vérifier rôle admin
            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('role, full_name')
                .eq('id', session.user.id)
                .single();

            if (profileError || !profile || profile.role !== 'admin') {
                showMessage('❌ Accès refusé. Rôle: ' + (profile?.role || 'inconnu'), 'error');
                return;
            }
            console.log('✅ Admin confirmé:', profile);

            // 3. Afficher contenu
            document.getElementById('adminContent').style.display = 'block';
            showMessage('✅ Admin connecté avec succès!', 'success');
            // 4. Charger données
            await loadData();
        }

        async function loadData() {
            console.log('📊 Chargement des données...');

            // Charger utilisateurs
            const { data: users, error: usersError } = await supabaseClient
                .from('profiles')
                .select('*')
                .order('created_at', { ascending: false });

            if (usersError) {
                console.error('Erreur users:', usersError);
                showMessage('Erreur utilisateurs: ' + usersError.message, 'error');
            } else {
                console.log('✅ Users chargés:', users.length);
                document.getElementById('statUsers').textContent = users.length;
                renderUsers(users);
            }

            // Charger prompts
            const { data: prompts, error: promptsError } = await supabaseClient
                .from('prompts')
                .select('*')
                .order('created_at', { ascending: false });

            if (promptsError) {
                console.error('Erreur prompts:', promptsError);
            } else {
                console.log('✅ Prompts chargés:', prompts.length);
                document.getElementById('statPrompts').textContent = prompts.length;
                renderPrompts(prompts);
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = users.map(u => {
                const badge = u.role === 'admin' ? 'badge-admin' : u.role === 'seller' ? 'badge-seller' : 'badge-buyer';
                return `<tr>
                    <td>${u.full_name || 'N/A'}</td>
                    <td>${u.id.substring(0, 8)}...</td>
                    <td><span class="badge ${badge}">${u.role || 'buyer'}</span></td>
                    <td>
                        <button class="btn" onclick="changeRole('${u.id}', 'seller')">Vendeur</button>
                        <button class="btn btn-danger" onclick="changeRole('${u.id}', 'buyer')">Acheteur</button>
                    </td>
                </tr>`;            }).join('');
        }

        function renderPrompts(prompts) {
            const tbody = document.getElementById('promptsTable');
            if (prompts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 2rem;">Aucun prompt</td></tr>';
                return;
            }
            tbody.innerHTML = prompts.map(p => `<tr>
                <td>${p.title}</td>
                <td>$${p.price}</td>
                <td>${p.status || 'published'}</td>
                <td><button class="btn btn-danger" onclick="deletePrompt('${p.id}')">Supprimer</button></td>
            </tr>`).join('');
        }

        async function changeRole(userId, newRole) {
            const { error } = await supabaseClient.from('profiles').update({ role: newRole }).eq('id', userId);
            if (error) {
                alert('Erreur: ' + error.message);
            } else {
                alert('✅ Rôle changé en ' + newRole);
                loadData();
            }
        }

        async function deletePrompt(id) {
            if (!confirm('Supprimer ce prompt ?')) return;
            const { error } = await supabaseClient.from('prompts').delete().eq('id', id);
            if (error) {
                alert('Erreur: ' + error.message);
            } else {
                alert('✅ Prompt supprimé');
                loadData();
            }
        }

        function showMessage(msg, type) {
            document.getElementById('messages').innerHTML = `<div class="${type}">${msg}</div>`;
        }

        // Lancer au chargement
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
