<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0e1a; color: white; padding: 20px; }
        .error { background: #ef4444; color: white; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .success { background: #10b981; color: white; padding: 15px; border-radius: 8px; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: left; }
        th { background: #1e293b; }
        .btn { padding: 8px 16px; background: #22d3ee; color: #0a0e1a; border: none; border-radius: 6px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #22d3ee; }
    </style>
</head>
<body>
    <h1>🎛️ PromptHub Admin</h1>
    <div id="messages"></div>
    
    <div class="stats" id="stats" style="display:none;">
        <div class="stat-card"><div>Utilisateurs</div><div class="stat-value" id="statUsers">0</div></div>
        <div class="stat-card"><div>Prompts</div><div class="stat-value" id="statPrompts">0</div></div>
    </div>

    <div id="usersSection" style="display:none;">
        <h2>Utilisateurs</h2>
        <table id="usersTable">
            <thead><tr><th>Nom</th><th>Rôle</th><th>Actions</th></tr></thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://osewbqnjhokpwmoalxcd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZXdicW5qaG9rcHdtb2FseGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTcyMTQsImV4cCI6MjA5NjU5MzIxNH0.knlpmVwUa2gd_ft3AptsUpl5gih4rCjTBYqGSRK5p38';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            console.log('🚀 Démarrage...');
            
            // Test connexion
            const { data: { session }, error } = await supabase.auth.getSession();
            console.log('Session:', session);
            console.log('Error:', error);
            
            if (!session) {
                showMessage('❌ Non connecté. Connecte-toi d\'abord sur auth.html', 'error');
                return;
            }

            // Test table profiles
            const { data: profiles, error: profilesError } = await supabase
                .from('profiles')
                .select('*');
            
            console.log('Profiles:', profiles);
            console.log('Error profiles:', profilesError);
            
            if (profilesError) {
                showMessage('❌ Erreur profiles: ' + profilesError.message, 'error');
                return;
            }

            // Afficher stats
            document.getElementById('stats').style.display = 'grid';
            document.getElementById('statUsers').textContent = profiles?.length || 0;
            
            // Afficher utilisateurs
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = profiles.map(p => `
                <tr>
                    <td>${p.full_name || 'N/A'}</td>
                    <td>${p.role || 'buyer'}</td>
                    <td><button class="btn" onclick="alert('ID: ${p.id}')">Voir ID</button></td>
                </tr>
            `).join('');
            
            document.getElementById('usersSection').style.display = 'block';
            showMessage('✅ Tout fonctionne !', 'success');
        }

        function showMessage(msg, type) {
            document.getElementById('messages').innerHTML = `<div class="${type}">${msg}</div>`;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
