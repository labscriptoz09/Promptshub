<!DOCTYPE html>
<html>
<head>
    <title>Test Admin - Corrigé</title>
    <style>
        body { background: #0a0e1a; color: white; padding: 20px; font-family: Arial; }
        .box { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #22d3ee; }
        .error { border-left-color: #ef4444; background: #450a0a; }
        .success { border-left-color: #10b981; background: #064e3b; }
    </style>
</head>
<body>
    <h1>🔍 Test Admin - Version Corrigée</h1>
    <div id="output"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ✅ CRÉER LE CLIENT SUPABASE EN PREMIER
        const SUPABASE_URL = 'https://osewbqnjhokpwmoalxcd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZXdicW5qaG9rcHdtb2FseGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTcyMTQsImV4cCI6MjA5NjU5MzIxNH0.knlpmVwUa2gd_ft3AptsUpl5gih4rCjTBYqGSRK5p38';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            console.log(msg);
            output.innerHTML += `<div class="box ${type}">${msg}</div>`;
        }

        async function test() {
            log('🚀 ÉTAPE 1: Initialisation...', 'info');
            log('✅ Client Supabase prêt', 'success');
            
            try {
                log('🔄 ÉTAPE 2: Vérification session...', 'info');
                const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
                
                if (sessionError) {
                    log('❌ Erreur session: ' + sessionError.message, 'error');
                    return;
                }
                
                if (!session) {
                    log('❌ PAS DE SESSION - Tu n\'es pas connecté!', 'error');
                    log('👉 Va sur auth.html et connecte-toi d\'abord', 'error');
                    return;
                }
                
                log('✅ ÉTAPE 3: Connecté en tant que: ' + session.user.email, 'success');
                log('User ID: ' + session.user.id, 'info');
                
                log('🔄 ÉTAPE 4: Test table profiles...', 'info');
                const { data: profiles, error: profilesError } = await supabaseClient
                    .from('profiles')
                    .select('*');
                
                if (profilesError) {
                    log('❌ Erreur profiles: ' + profilesError.message, 'error');
                    log('👉 Problème de permissions RLS ou table inexistante', 'error');
                    return;
                }
                
                log('✅ ÉTAPE 5: Profiles chargés: ' + profiles.length + ' utilisateurs', 'success');
                
                const myProfile = profiles.find(p => p.id === session.user.id);
                if (!myProfile) {
                    log('❌ Ton profil n\'existe pas dans la table profiles!', 'error');
                    log('👉 Ton User ID: ' + session.user.id, 'info');
                    return;
                }
                
                log('✅ ÉTAPE 6: Ton profil trouvé!', 'success');
                log('Rôle: ' + (myProfile.role || 'NON DÉFINI'), myProfile.role === 'admin' ? 'success' : 'error');
                
                if (myProfile.role !== 'admin') {
                    log('❌ Tu n\'es PAS admin! Ton rôle est: ' + myProfile.role, 'error');
                    log('👉 Va dans Supabase → Table Editor → profiles', 'error');
                    log('👉 Trouve ta ligne et change "role" de "buyer" à "admin"', 'error');
                } else {
                    log('🎉 TOUT FONCTIONNE! Tu es admin!', 'success');
                    log('👉 Tu peux maintenant utiliser admin.html', 'success');
                }
                
            } catch (err) {
                log('❌ ERREUR: ' + err.message, 'error');
            }
        }

        // Attendre que la page soit chargée
        window.addEventListener('DOMContentLoaded', test);
    </script>
</body>
</html>
